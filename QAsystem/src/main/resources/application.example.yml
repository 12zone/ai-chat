# 复制为 application.yml 后填写真实值；application.yml 已被 .gitignore 忽略，勿提交。
# cp src/main/resources/application.example.yml src/main/resources/application.yml

server:
  port: 8080

spring:
  ai:
    openai:
      base-url: https://api.openai.com/v1
      api-key: YOUR_OPENAI_API_KEY
    deepseek:
      enabled: true
      base-url: https://api.deepseek.com/v1
      api-key: YOUR_DEEPSEEK_API_KEY

  datasource:
    url: jdbc:mysql://localhost:3306/qasystem?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: YOUR_DB_USER
    password: YOUR_DB_PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  sql:
    init:
      mode: always
      encoding: UTF-8

  profiles:
    active: milvus

app:
  security:
    jwt:
      # HS256：解码后须 >= 32 字节。以下为仅占位用的合法 Base64，生产务必换成 openssl rand -base64 48
      secret-base64: dGhpc2lzYTMyYnl0ZWxvbmdzZWNyZXRrZXkxMjM0

  embedding:
    openai:
      model: text-embedding-ada-002
  vector-search:
    provider: milvus
    top-k: 5
    milvus-url: ./data/milvus-lite.db
    collection-name: file-chunks
    dimension: 1536
